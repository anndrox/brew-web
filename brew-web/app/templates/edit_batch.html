{% extends "base.html" %}
{% block content %}
<h1>Edit Batch</h1>

<form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <label for="name">Batch Name:</label><br/>
  <input type="text" id="name" name="name" value="{{ batch.name }}" required><br/><br/>

  <label for="start_date">Start Date:</label><br/>
  <input type="date" id="start_date" name="start_date" value="{{ batch.start_date.strftime('%Y-%m-%d') }}" required><br/><br/>

  <label for="end_date">End Date:</label><br/>
  <input type="date" id="end_date" name="end_date" value="{{ batch.end_date.strftime('%Y-%m-%d') if batch.end_date else '' }}"><br/><br/>

  <label for="recipe_id">Recipe:</label><br/>
  <select id="recipe_id" name="recipe_id" required>
    {% for recipe in recipes %}
      <option value="{{ recipe.id }}" {% if batch.recipe_id == recipe.id %}selected{% endif %}>{{ recipe.name }}</option>
    {% endfor %}
  </select><br/><br/>

  <label for="yeast_id">Yeast Type:</label><br/>
  <select id="yeast_id" name="yeast_id">
    <option value="">-- Select Yeast --</option>
    {% for yeast in yeasts %}
      <option value="{{ yeast.id }}"
        {% if recipe and recipe.yeast_id == yeast.id %}selected{% endif %}>
        {{ yeast.name }} ({{ yeast.alcohol_type }})
      </option>
    {% endfor %}
  </select><br/><br/>

  <label for="batch_size">Batch Size (gallons):</label><br/>
  <input type="number" id="batch_size" name="batch_size" step="0.1" value="{{ batch.batch_size or '' }}"><br/><br/>
  
  <label for="initial_gravity">Original Gravity:</label><br/>
  <input type="text" id="initial_gravity" name="initial_gravity" value="{{ '%.3f' % batch.initial_gravity if batch.initial_gravity else '' }}"><br/><br/>

  <label for="final_gravity">Final Gravity:</label><br/>
  <input type="text" id="final_gravity" name="final_gravity" value="{{ '%.3f' % batch.final_gravity if batch.final_gravity else '' }}"><br/><br/>

  <label for="fermentation_temp">Fermentation Temp (°F):</label><br/>
  <input type="text" id="fermentation_temp" name="fermentation_temp" value="{{ batch.fermentation_temp or '' }}"><br/><br/>

  <label for="water_type">Water Type:</label><br/>
    <select id="water_type" name="water_type">
      <option value="">-- Select --</option>
      {% for wt in ['Filtered Tap', 'Spring Water', 'Distilled', 'Well Water', 'Unfiltered Tap'] %}
        <option value="{{ wt }}" {% if request.form.get('water_type') == wt %}selected{% endif %}>{{ wt }}</option>
      {% endfor %}
    </select><br/><br/>
  <label for="yeast_type">Yeast Notes (Optional):</label><br/>
  <input type="text" id="yeast_type" name="yeast_type" value="{{ batch.yeast_type or '' }}"><br/><br/>

  <label><input type="checkbox" name="enable_tosna" {% if batch.tosna_enabled %}checked{% endif %}> Enable TOSNA</label><br/><br/>

  <label><input type="checkbox" name="backsweetened" {% if batch.backsweetened %}checked{% endif %}> Backsweetened</label><br/><br/>

  <label><input type="checkbox" name="pectic_used" {% if batch.pectic_used %}checked{% endif %}> Pectic Enzyme Used</label><br/><br/>

  <label for="flavor_additions">Flavor Additions:</label><br/>
  <textarea id="flavor_additions" name="flavor_additions" rows="3" cols="50">{{ batch.flavor_additions or '' }}</textarea><br/><br/>

  <label for="notes">Notes:</label><br/>
  <textarea id="notes" name="notes" rows="4" cols="50">{{ batch.notes or '' }}</textarea><br/><br/>

  <button type="submit">💾 Save Changes</button>
</form>

{% endblock %}
