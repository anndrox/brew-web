{% extends "base.html" %}

{% block content %}
{% if show_warning %}
  <div class="banner" style="max-width: 600px; margin: 60px auto; text-align: center;">
    <h2>🚫 No Recipes Found</h2>
    <p>You must create at least one recipe before starting a new batch.</p>
    <p><a class="btn btn-primary" href="{{ url_for('routes.new_recipe') }}">➕ Add a Recipe</a></p>
  </div>
{% endif %}

<h1>New Batch</h1>

<form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

  <label>Name:</label>
  <input name="name" value="{{ request.form.get('name', '') }}"/><br/>

  <label>Recipe:</label>
  <select name="recipe_id" required>
    {% for r in recipes %}
      <option value="{{ r.id }}" {% if request.form.get('recipe_id') == r.id|string %}selected{% endif %}>{{ r.name }}</option>
    {% endfor %}
  </select><br/>

  <label>Start Date:</label>
  <input name="start_date" type="date" value="{{ request.form.get('start_date', '') }}"/><br/>

  <label>End Date:</label>
  <input name="end_date" type="date" value="{{ request.form.get('end_date', '') }}"/><br/>

  <label>Batch Size (gal):</label>
  <input name="batch_size" type="number" step="0.01" required><br/>
  <label for="water_type">Water Type:</label>
  <select id="water_type" name="water_type">
    <option value="">-- Select --</option>
    {% for wt in ['Filtered Tap', 'Spring Water', 'Distilled', 'Well Water', 'Unfiltered Tap'] %}
      <option value="{{ wt }}" {% if request.form.get('water_type') == wt %}selected{% endif %}>{{ wt }}</option>
    {% endfor %}
  </select><br/>

  <label>Fermentation Temp:</label>
  <input name="fermentation_temp" value="{{ request.form.get('fermentation_temp', '') }}"/><br/>

  <label for="initial_gravity">Initial Gravity:</label><br/>
  <input id="initial_gravity" name="initial_gravity"
         type="text" inputmode="decimal"
         pattern="1\.\d{2,3}" placeholder="e.g., 1.090"
         required><br/>

  <label>Final Gravity:</label>
  <input name="final_gravity" value="{{ request.form.get('final_gravity', '') }}"/><br/>

  <label>Yeast Type:</label>
  <input name="yeast_type" value="{{ request.form.get('yeast_type', '') }}"/><br/>
  
  <label><input type="checkbox" name="enable_tosna"> Add TOSNA schedule</label><br/>

  <label>Backsweetened:</label>
  <input type="checkbox" name="backsweetened" {% if request.form.get('backsweetened') %}checked{% endif %}/><br/>

  <label>Flavor Additions:</label><br/>
  <textarea name="flavor_additions">{{ request.form.get('flavor_additions', '') }}</textarea><br/>

  <label>Pectic Enzyme Used:</label>
  <input type="checkbox" name="pectic_used" {% if request.form.get('pectic_used') %}checked{% endif %}/><br/>

  <label>Notes:</label><br/>
  <textarea name="notes">{{ request.form.get('notes', '') }}</textarea><br/>

  <button type="submit">Create Batch</button>
</form>

<a href="{{ url_for('routes.index') }}">Cancel</a>
{% endblock %}
